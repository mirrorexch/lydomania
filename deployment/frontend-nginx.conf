server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 256;

    # Tiny health-check (used by the container HEALTHCHECK)
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # The TonConnect manifest must be reachable at the site root.
    location = /tonconnect-manifest.json {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }

    # Static SFX pack (Phase 4a)
    location /sfx/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Hashed asset bundles — long-cache
    location /static/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback for React Router
    location / {
        try_files $uri /index.html;
    }
}
