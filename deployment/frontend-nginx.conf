server {
    listen 80 default_server;
    # Dual-stack: the container HEALTHCHECK probes http://localhost/healthz,
    # and `localhost` resolves to ::1 first — without an IPv6 listener the
    # probe is refused and the container is wrongly marked unhealthy.
    listen [::]:80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 256;

    # Tiny health-check (used by the container HEALTHCHECK)
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ---- index.html: ALWAYS revalidate ----
    # Phase 11.2.8 — CRA produces hashed bundles in /static/* with content
    # hashes in the filename, so those are safely long-cached (see below).
    # But index.html is the manifest that tells the browser WHICH hash to
    # load, so it MUST never be served stale, or the Telegram WebView
    # keeps pointing at an old /static/js/main.<oldhash>.js bundle that
    # may not even exist on disk after a fresh build. Without an explicit
    # `no-store`, nginx falls back to heuristic caching (browser-side
    # ETag/Last-Modified guessing) and the WebView happily holds the old
    # HTML across deploys.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires off;
        try_files $uri =404;
    }

    # The TonConnect manifest must be reachable at the site root.
    location = /tonconnect-manifest.json {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }

    # Static SFX pack (Phase 4a)
    location /sfx/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Hashed asset bundles — long-cache
    location /static/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback for React Router.
    # Phase 11.2.8 — All non-asset paths resolve back to index.html, so the
    # no-store policy from `location = /index.html` must ALSO apply here:
    # a deep-link like /cases or /crash gets served as index.html through
    # try_files, but because nginx matches `location /` (not `= /index.html`)
    # for those requests, the headers above wouldn't apply without this
    # duplication. Repeating the headers here is the canonical way per
    # nginx docs (header inheritance does NOT propagate across location
    # blocks unless explicitly opted in).
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires off;
        try_files $uri /index.html;
    }
}
